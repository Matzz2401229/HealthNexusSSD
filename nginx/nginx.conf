# =====================================================================
# HealthNexus reverse proxy (§9.3, D1 §9.3/§9.6)
# - TLS termination on 443
# - HTTP -> HTTPS redirect
# - Security headers (NFSR2, SR15)
# - Rate limiting (brute-force defence in depth)
# - No version banner (server_tokens off)
# =====================================================================
user  nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;                     # no nginx version banner (NFSR2)

    # --- rate limiting zones ---
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m   rate=5r/m;

    # --- HTTP: redirect everything to HTTPS ---
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS ---
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # Server private key lives in a mounted volume, never in git (§7).
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS only + explicit cipher suites (report §2.3 rationale).
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- Security headers (NFSR2, SR15) ---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        client_max_body_size 10m;          # matches upload cap (D1 §9.4)

        # --- API -> Node backend ---
        location /api/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://backend:8080/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Stricter limit on auth endpoints (brute-force) ---
        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://backend:8080/auth/login;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Frontend PWA ---
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
        }
    }
}
