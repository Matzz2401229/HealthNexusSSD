# =====================================================================
# HealthNexus — local stack (§9.2). `docker compose up` brings up the
# whole app: nginx (TLS) -> frontend + backend -> MySQL.
# Only ports 80/443 are published; DB is NOT exposed to the host (D1 §9.6).
# =====================================================================
services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS cert + key mounted at runtime — NOT baked into the image, NOT in git.
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - .env
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    # Containers run non-root (D1 §9.6) — enforced in the Dockerfile.
    restart: unless-stopped

  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    # No `ports:` block — DB is only reachable on the internal compose network.
    ports:
    - "3307:3306" # !! to be deleted once whole project is done
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
