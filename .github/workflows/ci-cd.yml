name: HealthNexus SSD CI/CD

# Runs on every feature branch and PR into dev/main so problems are caught
# early (D2 §2.1).
on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev

# Cancel an in-progress run if new commits are pushed to the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Backend: install -> lint -> test -> dependency scan (SDR5, SDR6, NFSR9)
  # ---------------------------------------------------------------------
  backend:
    name: Backend (lint, test, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests (with coverage)
        run: npm test

      # Dependency vulnerability scanning — blocks on high/critical CVEs (SDR5/NFSR9)
      - name: Dependency audit
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------
  # Frontend: install -> build -> dependency scan
  # ---------------------------------------------------------------------
  frontend:
    name: Frontend (build, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------
  # SAST — static analysis on every PR (SDR4). Serious findings fail CI.
  # ---------------------------------------------------------------------
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pipx install semgrep

      - name: Run Semgrep
        run: semgrep --config p/javascript --config p/typescript --config p/security-audit --error

  secret-scan:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
