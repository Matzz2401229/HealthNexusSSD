name: HealthNexus SSD CI/CD

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    name: CI - Basic Repository Check
    runs-on: ubuntu-latest

    steps:
      - name: Get repository code
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Listing repository files..."
          ls -la

      - name: Confirm project documentation exists
        run: |
          echo "Checking for README.md..."
          test -f README.md
          echo "README.md found."

      - name: Check workflow file exists
        run: |
          echo "Checking GitHub Actions workflow..."
          test -f .github/workflows/ci-cd.yml
          echo "Workflow file found."

      - name: CI completed
        run: |
          echo "HealthNexus SSD CI pipeline completed successfully."
          echo "Future stages will include React build, Express tests, Docker build, and EC2 deployment."
